[target.thumbv6m-none-eabi]
# runner = "probe-rs run --chip RP2040"
runner = "sudo picotool load --update --verify --execute -t elf"
rustflags = [
    "-C", "link-arg=-Tlink.x",
    "-C", "link-arg=-Tdefmt.x",
    "--cfg", "portable_atomic_unsafe_assume_single_core",
]

[build]
target = "thumbv6m-none-eabi"

[env]
DEFMT_LOG = "debug"
